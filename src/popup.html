<!doctype html>
<html lang="ja">

  <link rel="stylesheet" href="ui.css">
  <script src="popup.js" defer></script>
  <title>Misskey Patcher</title>
</head>
<body class="popup">
  <main>
    <h1>Misskey Patcher</h1>
    <p id="instanceHost" class="meta"></p>

</html>
